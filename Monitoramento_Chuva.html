<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MONITORAMENTO DE CHUVA - COA USA</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
  :root {
    --usa-verde-escuro: #004A2F;
    --usa-verde-medio: #2D7A4C;
    --usa-verde-claro: #B2D969;
    --usa-azul-petroleo: #265E64;
    --usa-perigo-vermelho: #D93B2B;
    --bg-body: #f0f2f5;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  
  html,body { margin:0; background:var(--bg-body); color:#334155; font:11px/1.4 'Segoe UI', Arial, sans-serif; padding-top: 130px; }
  
  /* --- CABEÇALHO E NAVEGAÇÃO --- */
  .header-main-fixed {
    background-color: var(--usa-verde-escuro);
    color: white; padding: 10px 20px;
    display: flex; justify-content: space-between; align-items: center;
    position: fixed; top: 0; left: 0; width: 100%; z-index: 1001; box-shadow: var(--shadow); box-sizing: border-box;
  }

  .nav-tabs {
    background: #f8f9fa;
    border-bottom: 3px solid var(--usa-verde-claro);
    position: fixed; top: 65px; left: 0; width: 100%;
    display: flex; gap: 2px; padding: 0 10px;
    z-index: 1000; overflow-x: auto; white-space: nowrap;
  }

  .tab-item {
    padding: 12px 20px; text-decoration: none; color: #555; font-size: 11px;
    font-weight: bold; text-transform: uppercase; border-top-left-radius: 8px;
    border-top-right-radius: 8px; transition: 0.3s; border: 1px solid transparent;
    display: flex; align-items: center; gap: 5px;
  }

  .tab-active { 
    background: white !important; 
    color: var(--usa-verde-escuro) !important; 
    border: 1px solid #dee2e6; 
    border-bottom: 3px solid white; 
    position: relative; 
    top: 1px; 
  }

  /* Estilo para a Captura */
  .capture-mode { background: #fff !important; padding: 10px !important; }
  .capture-mode .no-print, .capture-mode .btn-remove, .capture-mode .header-main-fixed, .capture-mode .nav-tabs { display: none !important; }
  .capture-mode .input-fonte, .capture-mode .input-status { border: none !important; padding: 4px !important; pointer-events: none; }
  .capture-mode .report-header { box-shadow: none; background: #fff; color: var(--usa-verde-escuro); border-bottom: 2px solid var(--usa-verde-escuro); margin-bottom: 10px; border-radius: 0; }
  .capture-mode .front-card { box-shadow: none; border: 1px solid #000; margin-bottom: 8px; }

  .page { max-width: 1200px; margin: 10px auto; padding: 0 10px 50px 10px; }
  
  .report-header { 
    background: var(--usa-verde-escuro); padding: 12px 20px; 
    display: flex; justify-content: space-between; align-items: center; color: #fff; 
    border-radius: 8px 8px 0 0; box-shadow: var(--shadow);
  }

  .brand h1 { margin: 0; font-size: 18px; font-weight: 900; text-transform: uppercase; }
  .brand p { margin: 0; font-size: 9px; text-transform: uppercase; opacity: 0.8; }

  .content { padding: 10px 0; }
  
  .front-card { 
    background: #fff; margin-bottom: 15px; border-radius: 8px; 
    display: flex; flex-direction: column; overflow: hidden; 
    box-shadow: var(--shadow); border: 1px solid #e2e8f0; position: relative;
  }
  
  .card-header-frente {
    background: var(--usa-azul-petroleo); color: #fff; padding: 6px 15px;
    font-weight: 900; font-size: 12px; text-transform: uppercase;
    display: flex; justify-content: space-between; align-items: center;
  }

  .card-body {
    display: grid;
    grid-template-columns: 1fr 100px 260px 80px 130px 40px;
  }
  
  .col-info { padding: 10px; border-right: 1px solid #f1f5f9; display: flex; flex-direction: column; justify-content: center; }
  .val-edit { font-size: 12px; font-weight: 800; color: var(--usa-verde-escuro); outline: none; text-transform: uppercase; min-height: 1.4em; border-bottom: 1px dashed #cbd5e1; }

  .input-fonte, .input-status {
    width: 100%; border: 1px solid #e2e8f0; border-radius: 4px; padding: 4px;
    font-size: 11px; font-weight: 900; color: var(--usa-verde-escuro); 
    text-transform: uppercase; outline: none; background: #f8fafc;
  }

  .status-trabalhando { background-color: #2D7A4C !important; color: white !important; }
  .status-parado { background-color: #D93B2B !important; color: white !important; }

  .turns-container { display: grid; grid-template-columns: repeat(3, 1fr); background: #fdfdfd; }
  .turn-cell { border-right: 1px solid #f1f5f9; text-align: center; }
  .turn-h { background: #f1f5f9; font-size: 9px; font-weight: 800; padding: 4px 0; color: #475569; border-bottom: 1px solid #e2e8f0; }
  .turn-input { padding: 10px 0; font-size: 16px; font-weight: 900; outline: none; color: var(--usa-azul-petroleo); }

  .col-total { background: #f8fafc; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid #f1f5f9; }
  .total-val { font-size: 18px; font-weight: 900; color: #64748b; }
  .has-rain { color: var(--usa-perigo-vermelho) !important; }

  .col-status { background: #fff; display: flex; flex-direction: column; justify-content: center; padding: 10px; }

  .controls-bar { display: flex; gap: 10px; }
  .btn-remove { background: #fee2e2; color: #b91c1c; border: none; font-size: 9px; font-weight: 900; cursor: pointer; padding: 3px 8px; border-radius: 4px; }
  .btn-action { border: none; padding: 8px 15px; border-radius: 6px; font-weight: 900; cursor: pointer; font-size: 10px; text-transform: uppercase; transition: 0.3s; }
  .btn-add { background: var(--usa-verde-medio); color: #fff; }
  .btn-capture { background: #25d366; color: #fff; }
  .label-small { font-size: 8px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 3px; }

  @media print {
    body { padding-top: 0; }
    .header-main-fixed, .nav-tabs, .no-print { display: none !important; }
  }
</style>
</head>
<body>

<datalist id="opcoes-fonte">
  <option value="ZEUS">
  <option value="FRENTE">
</datalist>

<datalist id="opcoes-status">
  <option value="TRABALHANDO">
  <option value="PARADO">
</datalist>

<header class="header-main-fixed">
    <div style="visibility: hidden;">Apoio</div>
    <div style="text-align: center;">
        <div style="font-size: 14px; font-weight: 800;">SISTEMA INTEGRADO DE LOGÍSTICA</div>
        <div style="font-size: 10px; color: var(--usa-verde-claro);">USINA SANTA ADÉLIA</div>
    </div>
    <div style="visibility: hidden;">Apoio</div>
</header>

<div class="no-print" style="margin: 10px; text-align: center;">
    <label>FILTRAR DATA:</label>
    <input type="date" id="filtro-data" onchange="carregarDadosDaFrota()">
</div>

<nav class="nav-tabs">
    <a href="Gestor de Cores.html" class="tab-item">🎨 Gestor de Cores</a>
    <a href="Cadastros.html" class="tab-item">⚙️ Cadastros</a>
    <a href="Localizacao_Frota.html" class="tab-item">🚜 Localização Frota</a>
    <a href="Monitoramento_Chuva.html" class="tab-item tab-active">🌧️ Chuva</a>
    <a href="Resumo_PPT.html" class="tab-item">📈 Resumo PPT</a>
    <a href="Pasta_viva.html" class="tab-item">📂 Pasta Viva</a>
    <a href="Banco_dados_PPT.html" class="tab-item">🗄️ Banco de Dados</a>
    <a href="Graficos_Herbicida.html" class="tab-item">📊 Graficos</a>
</nav>

<div class="page" id="area-relatorio">
  <header class="report-header">
    <div class="brand">
        <h1>USINA SANTA ADÉLIA</h1>
        <p>Centro de Operações Agrícolas • Monitoramento Pluviométrico</p>
    </div>
    <div class="controls-bar no-print">
      <button class="btn-action btn-add" onclick="addFrenteManual()">+ Add Frente</button>
      <button class="btn-action btn-capture" id="btnCapture" onclick="tirarPrint()">📸 Copiar para WhatsApp</button>
    </div>
  </header>

  <main class="content" id="frentesGrid"></main>

  <footer id="footer-obs" style="background: #fff; border-radius: 8px; padding: 15px; box-shadow: var(--shadow); border: 1px solid #e2e8f0;">
    <div style="font-weight: 900; font-size: 10px; color: var(--usa-verde-medio); margin-bottom: 5px;">OBSERVAÇÕES GERAIS:</div>
    <div contenteditable="true" style="min-height: 40px; outline: none; font-size: 12px; border-bottom: 1px dashed #ccc; text-transform: uppercase;">...</div>
  </footer>
</div>

<script>
const STORAGE_KEY = 'usa_v18_final';
const LAST_DATE_KEY = 'usa_ultima_data_consulta';

window.onload = () => {
    // Sincroniza a data com a última data consultada no sistema (ou hoje como fallback)
    let dataSalva = localStorage.getItem(LAST_DATE_KEY) || new Date().toISOString().split('T')[0];
    document.getElementById('filtro-data').value = dataSalva;
    carregarDadosDaFrota();
};

function createRowHTML(faz = "---", fonte = "ZEUS", a = "0", b = "0", c = "0", total = "0,0 mm", status = "", statusClass = "") {
    const rainClass = parseFloat(total.replace(',', '.')) > 0 ? 'has-rain' : '';
    return `
        <div class="card-body" style="border-bottom: 1px solid #eee;">
            <div class="col-info" style="width: 300px;"><div class="label-small">Fazenda / Talhão</div><div class="val-edit" contenteditable="true">${faz}</div></div>
            <div class="col-info" style="width: 100px;"><div class="label-small">Fonte</div><input type="text" class="input-fonte" list="opcoes-fonte" value="${fonte}"></div>
            <div class="turns-container">
                <div class="turn-cell"><div class="turn-h">A</div><div class="turn-input" contenteditable="true" oninput="updateTotal(this)">${a}</div></div>
                <div class="turn-cell"><div class="turn-h">B</div><div class="turn-input" contenteditable="true" oninput="updateTotal(this)">${b}</div></div>
                <div class="turn-cell"><div class="turn-h">C</div><div class="turn-input" contenteditable="true" oninput="updateTotal(this)">${c}</div></div>
            </div>
            <div class="col-total" style="width: 100px;"><div class="label-small">Total 24h</div><div class="total-val ${rainClass}">${total}</div></div>
            <div class="col-status" style="width: 150px;"><div class="label-small">Status Operacional</div><input type="text" class="input-status ${statusClass}" list="opcoes-status" oninput="colorirStatus(this)" placeholder="ESCOLHA..." value="${status}"></div>
            <div class="col-delete no-print" style="display:flex; align-items:center; justify-content:center;"><button class="btn-remove" title="Excluir Fazenda" onclick="removerFazenda(this)">✖</button></div>
        </div>
    `;
}

function addFazendaManual(el) {
    const faz = prompt("Nome da Fazenda / Talhão:");
    if (faz) {
        const card = el.closest('.front-card');
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = createRowHTML(faz.toUpperCase());
        card.appendChild(tempDiv.firstElementChild);
        salvarDados();
    }
}

function removerFazenda(el) {
    if (confirm("Deseja remover esta fazenda do relatório?")) {
        el.closest('.card-body').remove();
        salvarDados();
    }
}

function createFrenteHTML(nome, fazendaDefault = "---") {
    return `
        <div class="card-header-frente">
            <span>🚜 ${nome}</span>
            <div class="no-print" style="display:flex; gap:10px;">
                <button class="btn-action" style="background:var(--usa-verde-claro); color:var(--usa-verde-escuro); padding:2px 8px; font-size:9px;" onclick="addFazendaManual(this)">+ Fazenda</button>
                <button class="btn-remove" onclick="this.closest('.front-card').remove(); salvarDados();">REMOVER</button>
            </div>
        </div>
        ${createRowHTML(fazendaDefault)}
    `;
}

function colorirStatus(el) {
    const val = el.value.toUpperCase().trim();
    el.classList.remove('status-trabalhando', 'status-parado');
    if (val === "TRABALHANDO") el.classList.add('status-trabalhando');
    if (val === "PARADO") el.classList.add('status-parado');
}

function renderCard(nome, fazenda) {
    const card = document.createElement('div');
    card.className = 'front-card';
    card.innerHTML = createFrenteHTML(nome, fazenda);
    document.getElementById('frentesGrid').appendChild(card);
}

function renderGroupCard(processo, listaFazendas) {
    const container = document.getElementById('frentesGrid');
    const card = document.createElement('div');
    card.className = 'front-card';
    
    let rowsHtml = listaFazendas.map(faz => createRowHTML(faz)).join('');

    card.innerHTML = `
        <div class="card-header-frente">
            <span>🚜 ${processo}</span>
            <div class="no-print" style="display:flex; gap:10px;">
                <button class="btn-action" style="background:var(--usa-verde-claro); color:var(--usa-verde-escuro); padding:2px 8px; font-size:9px;" onclick="addFazendaManual(this)">+ Fazenda</button>
                <button class="btn-remove" onclick="this.closest('.front-card').remove(); salvarDados();">REMOVER</button>
            </div>
        </div>
        ${rowsHtml}
    `;
    container.appendChild(card);
}

function carregarDadosDaFrota() {
    const dataInput = document.getElementById('filtro-data').value;
    if (!dataInput) return;

    // Grava a data selecionada para manter sincronia entre as abas
    localStorage.setItem(LAST_DATE_KEY, dataInput);

    // Cálculo das datas operacional (05h de hoje até 04h de amanhã)
    const dataBase = dataInput.split('-').reverse().join('/');
    const dSeg = new Date(dataInput + "T12:00:00"); 
    dSeg.setDate(dSeg.getDate() + 1);
    const dataApos = dSeg.toISOString().split('T')[0].split('-').reverse().join('/');

    const dbRaw = localStorage.getItem(STORAGE_KEY);
    const db = dbRaw ? JSON.parse(dbRaw) : [];
    const container = document.getElementById('frentesGrid');
    const footerObs = document.querySelector('#footer-obs [contenteditable]');

    // 1. Mapear o que existe no Banco de Dados Real para este dia
    const agrupadoDB = {};
    db.forEach(item => {
        const h = parseInt(item.hora);
        const isHoje = (h >= 5 && item.data === dataBase);
        const isAmanha = (h >= 0 && h <= 4 && item.data === dataApos);
        if (!(isHoje || isAmanha)) return;

        const oper = (item.oper || "N/A").toUpperCase();
        if (oper === "PARADO" || oper === "N/A") return;

        const proc = (item.proc || "OPERACIONAL").toUpperCase();
        let fz = (item.fazenda || item.faz || "SEM FAZENDA").trim().toUpperCase();
        // Normaliza o nome da fazenda para evitar duplicidade (ex: "10703 / RANCHARIA" vira "10703 - RANCHARIA")
        fz = fz.replace(/\s*\/\s*/g, ' - ').replace(/\s*-\s*/g, ' - ');

        if (!agrupadoDB[proc]) agrupadoDB[proc] = new Set();
        agrupadoDB[proc].add(fz);
    });

    // 2. Tentar carregar o cache e SINCRONIZAR com as fazendas novas do DB
    const cacheKey = 'usa_chuva_save_' + dataInput;
    let report = JSON.parse(localStorage.getItem(cacheKey));

    if (report) {
        let mudou = false;
        // Sincronização: Se uma fazenda está no DB mas não está no relatório salvo, adiciona ela
        Object.keys(agrupadoDB).forEach(proc => {
            let card = report.cards.find(c => c.titulo === proc);
            if (!card) {
                card = { titulo: proc, rows: [] };
                report.cards.push(card);
                mudou = true;
            }
            agrupadoDB[proc].forEach(fz => {
                if (!card.rows.find(r => r.faz === fz)) {
                    card.rows.push({ faz: fz, fonte: "ZEUS", a: "0", b: "0", c: "0", total: "0,0 mm", status: "", statusClass: "" });
                    mudou = true;
                }
            });
        });
        if (mudou) localStorage.setItem(cacheKey, JSON.stringify(report));
    } else {
        // 3. Caso não existam dados salvos, gerar do zero baseado no DB
        report = { obs: "...", cards: [] };
        Object.keys(agrupadoDB).sort().forEach(proc => {
            const rows = Array.from(agrupadoDB[proc]).map(fz => ({
                faz: fz, fonte: "ZEUS", a: "0", b: "0", c: "0", total: "0,0 mm", status: "", statusClass: ""
            }));
            report.cards.push({ titulo: proc, rows });
        });
    }

    if (report.cards.length === 0) {
        container.innerHTML = "<p style='text-align:center; padding:20px; color:#94a3b8;'>Nenhum registro encontrado para esta data.</p>";
    } else {
        renderizarRelatorio(report);
    }
}

function renderizarRelatorio(report) {
    const container = document.getElementById('frentesGrid');
    const footerObs = document.querySelector('#footer-obs [contenteditable]');
    container.innerHTML = "";
    footerObs.innerText = report.obs || "...";

    if (!report.cards || report.cards.length === 0) {
        container.innerHTML = "<p style='text-align:center; padding:20px; color:#94a3b8;'>Nenhum registro encontrado para esta data.</p>";
        return;
    }

    report.cards.forEach(c => {
        const card = document.createElement('div');
        card.className = 'front-card';
        let rowsHtml = c.rows.map(r => createRowHTML(r.faz, r.fonte, r.a, r.b, r.c, r.total, r.status, r.statusClass)).join('');
        
        card.innerHTML = `
            <div class="card-header-frente">
                <span>🚜 ${c.titulo}</span>
                <div class="no-print" style="display:flex; gap:10px;">
                    <button class="btn-action" style="background:var(--usa-verde-claro); color:var(--usa-verde-escuro); padding:2px 8px; font-size:9px;" onclick="addFazendaManual(this)">+ Fazenda</button>
                    <button class="btn-remove" onclick="this.closest('.front-card').remove(); salvarDados();">REMOVER</button>
                </div>
            </div>
            ${rowsHtml}
        `;
        container.appendChild(card);
    });
}

function updateTotal(el) {
    // Sanitização: permite apenas números e uma única vírgula
    let text = el.innerText;
    // Substitui ponto por vírgula e remove tudo que não for dígito ou vírgula
    let clean = text.replace(/\./g, ',').replace(/[^\d,]/g, '');
    
    // Garante que exista apenas uma vírgula no texto
    const firstComma = clean.indexOf(',');
    if (firstComma !== -1) {
        clean = clean.substring(0, firstComma + 1) + clean.substring(firstComma + 1).replace(/,/g, '');
    }

    if (text !== clean) {
        el.innerText = clean;
        // Reposiciona o cursor no final do texto após a limpeza
        const range = document.createRange();
        const sel = window.getSelection();
        range.selectNodeContents(el);
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);
    }

    const linha = el.closest('.card-body');
    const inputs = linha.querySelectorAll('.turn-input');
    const display = linha.querySelector('.total-val');
    
    let soma = 0;
    inputs.forEach(i => {
        let txt = i.innerText.replace(',', '.');
        soma += parseFloat(txt) || 0;
    });
    
    display.innerText = soma.toFixed(1).replace('.', ',') + " mm";
    soma > 0 ? display.classList.add('has-rain') : display.classList.remove('has-rain');
    
    // CHAMADA PARA SALVAR SEMPRE QUE O TOTAL FOR ATUALIZADO
    salvarDados(); 
}

function salvarDados() {
    const dataInput = document.getElementById('filtro-data').value;
    if(!dataInput) return;

    const cards = [];
    document.querySelectorAll('.front-card').forEach(card => {
        const titulo = card.querySelector('.card-header-frente span').innerText.replace('🚜 ', '');
        const rows = [];
        card.querySelectorAll('.card-body').forEach(row => {
            rows.push({
                faz: row.querySelector('.val-edit').innerText,
                fonte: row.querySelector('.input-fonte').value,
                a: row.querySelectorAll('.turn-input')[0].innerText,
                b: row.querySelectorAll('.turn-input')[1].innerText,
                c: row.querySelectorAll('.turn-input')[2].innerText,
                total: row.querySelector('.total-val').innerText,
                status: row.querySelector('.input-status').value,
                statusClass: row.querySelector('.input-status').className
            });
        });
        cards.push({ titulo, rows });
    });

    const obs = document.querySelector('#footer-obs [contenteditable]').innerText;
    localStorage.setItem('usa_chuva_save_' + dataInput, JSON.stringify({ cards, obs }));
}

// Função que captura todos os dados da tela e salva no LocalStorage
// Monitora qualquer mudança de texto ou edição
document.addEventListener('blur', (e) => {
    if (e.target.classList.contains('turn-input') || 
        e.target.classList.contains('val-edit') || 
        e.target.classList.contains('input-fonte') || 
        e.target.classList.contains('input-status')) {
        
        // Se for input de turno, atualiza o cálculo da soma
        if (e.target.classList.contains('turn-input')) {
            updateTotal(e.target);
        }
        
        // Se for status, ajusta a cor
        if (e.target.classList.contains('input-status')) {
            colorirStatus(e.target);
        }

        // Salva automaticamente após qualquer edição
        salvarDados();
    }
}, true); // O 'true' captura o evento na fase de captura

// Bloqueia a quebra de linha (Enter) nos campos editáveis
document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.target.classList.contains('turn-input') || e.target.classList.contains('val-edit'))) {
        e.preventDefault();
        
        if (e.target.classList.contains('turn-input')) {
            const currentInput = e.target;
            const turnsContainer = currentInput.closest('.turns-container');
            const allTurnInputs = Array.from(turnsContainer.querySelectorAll('.turn-input'));
            const currentIndex = allTurnInputs.indexOf(currentInput);

            if (currentIndex !== -1 && currentIndex < allTurnInputs.length - 1) {
                allTurnInputs[currentIndex + 1].focus();
            } else {
                currentInput.blur(); // Se for o último, apenas tira o foco
            }
        } else {
            e.target.blur(); // Para val-edit, apenas tira o foco
        }
    }
});

// Evento Global: Monitora qualquer input (textos e selects) na página
document.addEventListener('input', (e) => {
    if (e.target.closest('.front-card')) {
        if (e.target.classList.contains('input-status')) {
            colorirStatus(e.target);
        }
        salvarDados();
    }
});

function addFrenteManual() {
    const nome = prompt("Nome da Frente:");
    if (nome) renderCard(nome.toUpperCase(), "---");
}

async function tirarPrint() {
    const btn = document.getElementById('btnCapture');
    const area = document.getElementById('area-relatorio');
    document.body.classList.add('capture-mode');
    btn.innerText = "⏳ GERANDO...";
    try {
        const canvas = await html2canvas(area, { backgroundColor: "#ffffff", scale: 2 });
        canvas.toBlob(async (blob) => {
            const item = new ClipboardItem({ "image/png": blob });
            await navigator.clipboard.write([item]);
            btn.innerText = "✅ COPIADO!";
            setTimeout(() => {
                btn.innerText = "📸 Copiar para WhatsApp";
                document.body.classList.remove('capture-mode');
            }, 2000);
        });
    } catch (err) {
        alert("Erro ao copiar.");
        document.body.classList.remove('capture-mode');
        btn.innerText = "📸 Copiar para WhatsApp";
    }
}

// O onload agora é gerenciado pela função anônima no topo do script
</script>
